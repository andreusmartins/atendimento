# =============================================
# Banco local (H2) - usado quando PGHOST não está definido
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/atendimento;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (só local)
spring.h2.console.enabled=${H2_CONSOLE:true}

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-para-o-sistema-2024}
admin.email=${ADMIN_EMAIL:admin@sistema.com}
admin.senha=${ADMIN_SENHA:admin123}
