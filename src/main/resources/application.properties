# =============================================
# Banco de dados - usa PostgreSQL se DATABASE_URL existir (produção Railway)
# caso contrário usa H2 local
# =============================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/atendimento;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 console (só local)
spring.h2.console.enabled=${H2_CONSOLE:true}

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-para-o-sistema-2024}
admin.email=${ADMIN_EMAIL:admin@sistema.com}
admin.senha=${ADMIN_SENHA:admin123}
